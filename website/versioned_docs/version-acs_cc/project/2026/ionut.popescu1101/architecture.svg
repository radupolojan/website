<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="monospace">
  <rect width="900" height="560" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="bold" letter-spacing="1">MFA SAFE LOCK — SYSTEM ARCHITECTURE</text>
  <text x="450" y="52" text-anchor="middle" fill="#64748b" font-size="10">STM32 Nucleo-U545RE-Q · Embassy Async Runtime · Rust</text>

  <!-- ── Embassy Runtime box ── -->
  <rect x="20" y="65" width="860" height="430" rx="10" fill="none" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="36" y="82" fill="#1e3a5f" font-size="10" font-weight="bold">EMBASSY ASYNC RUNTIME</text>

  <!-- ── Three input tasks (top row) ── -->
  <!-- NFC Task -->
  <rect x="50" y="100" width="160" height="90" rx="8" fill="#0c2340" stroke="#2563eb" stroke-width="1.5"/>
  <text x="130" y="122" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">Task: NFC</text>
  <text x="130" y="140" text-anchor="middle" fill="#60a5fa" font-size="10">PN532 · SPI1</text>
  <text x="130" y="155" text-anchor="middle" fill="#475569" font-size="9">PA5 SCK · PA6 MISO</text>
  <text x="130" y="168" text-anchor="middle" fill="#475569" font-size="9">PA7 MOSI · PB6 CS</text>

  <!-- Keypad Task -->
  <rect x="370" y="100" width="160" height="90" rx="8" fill="#0c2340" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="122" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">Task: Keypad</text>
  <text x="450" y="140" text-anchor="middle" fill="#a78bfa" font-size="10">4×4 Matrix · GPIO</text>
  <text x="450" y="155" text-anchor="middle" fill="#475569" font-size="9">PC0-PC3 Rows (OUT)</text>
  <text x="450" y="168" text-anchor="middle" fill="#475569" font-size="9">PC4-PC7 Cols (IN)</text>

  <!-- Fingerprint Task -->
  <rect x="690" y="100" width="160" height="90" rx="8" fill="#0c2340" stroke="#0d9488" stroke-width="1.5"/>
  <text x="770" y="122" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="bold">Task: Fingerprint</text>
  <text x="770" y="140" text-anchor="middle" fill="#2dd4bf" font-size="10">AS608 · UART2</text>
  <text x="770" y="155" text-anchor="middle" fill="#475569" font-size="9">PA2 TX · PA3 RX</text>
  <text x="770" y="168" text-anchor="middle" fill="#475569" font-size="9">57600 bps · IRQ RX</text>

  <!-- ── Channel labels (arrows down to FSM) ── -->
  <!-- NFC arrow -->
  <line x1="130" y1="190" x2="130" y2="230" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="138" y="216" fill="#2563eb" font-size="8">AuthEvent</text>
  <!-- Keypad arrow (goes via junction) -->
  <line x1="450" y1="190" x2="450" y2="230" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="458" y="216" fill="#7c3aed" font-size="8">AuthEvent</text>
  <!-- FP arrow -->
  <line x1="770" y1="190" x2="770" y2="230" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="778" y="216" fill="#0d9488" font-size="8">AuthEvent</text>

  <!-- Horizontal bus line -->
  <line x1="130" y1="230" x2="770" y2="230" stroke="#334155" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="450" y1="230" x2="450" y2="258" stroke="#e2e8f0" stroke-width="1.5" marker-end="url(#arrow-white)"/>
  <text x="462" y="248" fill="#94a3b8" font-size="8">Channel&lt;AuthEvent, 4&gt;</text>

  <!-- ── FSM Task (center) ── -->
  <rect x="310" y="258" width="280" height="110" rx="8" fill="#1a0a00" stroke="#f97316" stroke-width="2"/>
  <text x="450" y="281" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="bold">Task: Auth FSM</text>
  <text x="450" y="298" text-anchor="middle" fill="#fb923c" font-size="10">Authentication State Machine</text>
  <text x="450" y="315" text-anchor="middle" fill="#78350f" font-size="9">IDLE → NFC_SCAN → PIN_ENTRY</text>
  <text x="450" y="328" text-anchor="middle" fill="#78350f" font-size="9">→ FP_SCAN → GRANTED / DENIED</text>
  <text x="450" y="345" text-anchor="middle" fill="#475569" font-size="9">Timeouts · Retry logic · Event dispatch</text>

  <!-- FSM → Display channel -->
  <line x1="310" y1="313" x2="210" y2="313" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="218" y="308" fill="#f59e0b" font-size="8">DisplayCmd</text>

  <!-- Display Task -->
  <rect x="50" y="268" width="160" height="90" rx="8" fill="#1a1200" stroke="#d97706" stroke-width="1.5"/>
  <text x="130" y="291" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="bold">Task: Display</text>
  <text x="130" y="308" text-anchor="middle" fill="#fbbf24" font-size="10">LCD 16×2 · I2C1</text>
  <text x="130" y="323" text-anchor="middle" fill="#475569" font-size="9">PB8 SCL · PB9 SDA</text>
  <text x="130" y="336" text-anchor="middle" fill="#475569" font-size="9">addr 0x27 (PCF8574)</text>

  <!-- ── Outputs from FSM (bottom row) ── -->
  <!-- FSM → Servo -->
  <line x1="380" y1="368" x2="200" y2="420" stroke="#e11d48" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <!-- FSM → Buzzer -->
  <line x1="450" y1="368" x2="450" y2="418" stroke="#e11d48" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <!-- FSM → LEDs -->
  <line x1="520" y1="368" x2="700" y2="420" stroke="#e11d48" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Servo -->
  <rect x="100" y="418" width="150" height="66" rx="8" fill="#1a0010" stroke="#be185d" stroke-width="1.5"/>
  <text x="175" y="440" text-anchor="middle" fill="#fbcfe8" font-size="11" font-weight="bold">SG90 Servo</text>
  <text x="175" y="456" text-anchor="middle" fill="#ec4899" font-size="10">TIM2 CH1 · PWM</text>
  <text x="175" y="470" text-anchor="middle" fill="#475569" font-size="9">PA0 · 50 Hz · 1–2 ms</text>

  <!-- Buzzer -->
  <rect x="375" y="418" width="150" height="66" rx="8" fill="#130a1a" stroke="#9333ea" stroke-width="1.5"/>
  <text x="450" y="440" text-anchor="middle" fill="#e9d5ff" font-size="11" font-weight="bold">Buzzer (Passive)</text>
  <text x="450" y="456" text-anchor="middle" fill="#a855f7" font-size="10">GPIO / PWM · PB0</text>
  <text x="450" y="470" text-anchor="middle" fill="#475569" font-size="9">Beep patterns per event</text>

  <!-- LEDs -->
  <rect x="650" y="418" width="150" height="66" rx="8" fill="#001a08" stroke="#16a34a" stroke-width="1.5"/>
  <text x="725" y="440" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="bold">LEDs R / G / Y</text>
  <text x="725" y="456" text-anchor="middle" fill="#4ade80" font-size="10">GPIO · PB1 PB2 PB3</text>
  <text x="725" y="470" text-anchor="middle" fill="#475569" font-size="9">220 Ω series resistors</text>

  <!-- ── MB102 Power ── -->
  <rect x="340" y="500" width="220" height="40" rx="6" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="450" y="518" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="bold">MB102 Power Supply</text>
  <text x="450" y="533" text-anchor="middle" fill="#475569" font-size="9">3.3 V · 5 V · GND common with Nucleo</text>

  <!-- ── Arrow markers ── -->
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#2563eb" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#0d9488" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-white" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#e11d48" stroke-width="1.5"/>
    </marker>
  </defs>
</svg>