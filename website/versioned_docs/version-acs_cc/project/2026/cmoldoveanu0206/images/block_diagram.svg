<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Block diagram – Automated Drink Dispenser</title>
  <desc>Diagrama bloc a sistemului dozator automat de bauturi</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="620" fill="#ffffff"/>

  <!-- ── POWER SUPPLY ── -->
  <rect x="240" y="30" width="200" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#633806" x="340" y="52" text-anchor="middle" dominant-baseline="central">Sursă alimentare</text>
  <text font-family="sans-serif" font-size="12" fill="#854F0B" x="340" y="70" text-anchor="middle" dominant-baseline="central">12V 2A → LM2596 → 5V</text>

  <!-- 12V line left -->
  <line x1="240" y1="58" x2="130" y2="58" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#BA7517" x="183" y="50" text-anchor="middle">12V</text>

  <!-- 5V line down -->
  <line x1="340" y1="86" x2="340" y2="130" stroke="#3B6D11" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#3B6D11" x="354" y="114">5V</text>

  <!-- ── MCU ── -->
  <rect x="220" y="130" width="240" height="76" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C" x="340" y="155" text-anchor="middle" dominant-baseline="central">MCU</text>
  <text font-family="sans-serif" font-size="12" fill="#3C3489" x="340" y="173" text-anchor="middle" dominant-baseline="central">NUCLEO-U545RE-Q</text>
  <text font-family="sans-serif" font-size="12" fill="#3C3489" x="340" y="190" text-anchor="middle" dominant-baseline="central">Embassy-rs · Rust · no_std</text>

  <!-- ── USER INTERFACE container ── -->
  <rect x="490" y="110" width="165" height="120" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C" x="573" y="130" text-anchor="middle" dominant-baseline="central">Interfață UI</text>

  <!-- OLED sub-block -->
  <rect x="502" y="143" width="140" height="36" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#04342C" x="572" y="157" text-anchor="middle" dominant-baseline="central">OLED 0.96"</text>
  <text font-family="sans-serif" font-size="11" fill="#085041" x="572" y="171" text-anchor="middle" dominant-baseline="central">I2C · stare + progres</text>

  <!-- Encoder sub-block -->
  <rect x="502" y="187" width="140" height="36" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#04342C" x="572" y="201" text-anchor="middle" dominant-baseline="central">Rotary Encoder</text>
  <text font-family="sans-serif" font-size="11" fill="#085041" x="572" y="215" text-anchor="middle" dominant-baseline="central">KY-040 · GPIO INT</text>

  <!-- MCU ↔ UI -->
  <line x1="460" y1="168" x2="490" y2="168" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="180" x2="460" y2="180" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="11" fill="#085041" x="475" y="162" text-anchor="middle">I2C / GPIO</text>

  <!-- ── WEIGHING SYSTEM container ── -->
  <rect x="25" y="110" width="165" height="120" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53" x="108" y="130" text-anchor="middle" dominant-baseline="central">Sistem cântărire</text>

  <!-- Load Cell sub-block -->
  <rect x="37" y="143" width="140" height="36" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="107" y="157" text-anchor="middle" dominant-baseline="central">Load Cell 1kg</text>
  <text font-family="sans-serif" font-size="11" fill="#0C447C" x="107" y="171" text-anchor="middle" dominant-baseline="central">SparkFun · analog</text>

  <!-- HX711 sub-block -->
  <rect x="37" y="187" width="140" height="36" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="107" y="201" text-anchor="middle" dominant-baseline="central">HX711 Amp</text>
  <text font-family="sans-serif" font-size="11" fill="#0C447C" x="107" y="215" text-anchor="middle" dominant-baseline="central">DAT + SCK · bit-bang</text>

  <!-- Weighing → MCU -->
  <line x1="190" y1="168" x2="220" y2="168" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="11" fill="#0C447C" x="205" y="162" text-anchor="middle">GPIO</text>

  <!-- ── PUMP SYSTEM container ── -->
  <rect x="100" y="310" width="450" height="155" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C" x="325" y="332" text-anchor="middle" dominant-baseline="central">Sistem pompaj</text>

  <!-- MOSFET driver 1 -->
  <rect x="115" y="345" width="190" height="50" rx="6" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#4A1B0C" x="210" y="363" text-anchor="middle" dominant-baseline="central">Driver MOSFET #1</text>
  <text font-family="sans-serif" font-size="11" fill="#712B13" x="210" y="379" text-anchor="middle" dominant-baseline="central">IRLZ44N + 1N4007</text>

  <!-- Pump 1 -->
  <rect x="115" y="405" width="190" height="48" rx="6" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#4A1B0C" x="210" y="422" text-anchor="middle" dominant-baseline="central">Pompă 1 · 12V</text>
  <text font-family="sans-serif" font-size="11" fill="#712B13" x="210" y="440" text-anchor="middle" dominant-baseline="central">Lichid A · peristaltică</text>

  <!-- MOSFET driver 2 -->
  <rect x="375" y="345" width="165" height="50" rx="6" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#4A1B0C" x="458" y="363" text-anchor="middle" dominant-baseline="central">Driver MOSFET #2</text>
  <text font-family="sans-serif" font-size="11" fill="#712B13" x="458" y="379" text-anchor="middle" dominant-baseline="central">IRLZ44N + 1N4007</text>

  <!-- Pump 2 -->
  <rect x="375" y="405" width="165" height="48" rx="6" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="13" font-weight="500" fill="#4A1B0C" x="458" y="422" text-anchor="middle" dominant-baseline="central">Pompă 2 · 12V</text>
  <text font-family="sans-serif" font-size="11" fill="#712B13" x="458" y="440" text-anchor="middle" dominant-baseline="central">Lichid B · peristaltică</text>

  <!-- MCU → MOSFET1 -->
  <path d="M270 206 L270 282 L210 282 L210 310" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="11" fill="#3C3489" x="237" y="276" text-anchor="middle">GPIO 3.3V</text>

  <!-- MCU → MOSFET2 -->
  <path d="M380 206 L380 282 L458 282 L458 310" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="11" fill="#3C3489" x="424" y="276" text-anchor="middle">GPIO 3.3V</text>

  <!-- MOSFET1 → Pump1 -->
  <line x1="210" y1="395" x2="210" y2="405" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MOSFET2 → Pump2 -->
  <line x1="458" y1="395" x2="458" y2="405" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 12V from supply down left to MOSFETs -->
  <path d="M130 58 L130 370 L115 370" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- ── LEGEND ── -->
  <rect x="40" y="520" width="600" height="78" rx="8" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="340" y="538" text-anchor="middle">Legendă</text>

  <line x1="65" y1="556" x2="105" y2="556" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#444441" x="115" y="560">Date / Control (3.3V GPIO / I2C)</text>

  <line x1="65" y1="578" x2="105" y2="578" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#444441" x="115" y="582">Alimentare (12V / 5V)</text>

  <line x1="345" y1="556" x2="385" y2="556" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="sans-serif" font-size="12" fill="#444441" x="395" y="560">Comutare putere (MOSFET → Pompă)</text>
</svg>
