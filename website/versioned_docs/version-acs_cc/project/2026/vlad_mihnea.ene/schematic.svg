<svg viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<title>RustPad Hardware Schematic</title>
<style>
  text { font-family: sans-serif; }
  .th { font-size: 13px; font-weight: bold; }
  .ts { font-size: 11px; }
  .lbl { font-size: 10px; fill: #555; }
  .box-mcu  { fill: #EEEDFE; stroke: #534AB7; stroke-width: 1.5; }
  .box-in   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1.5; }
  .box-out  { fill: #E6F1FB; stroke: #185FA5; stroke-width: 1.5; }
  .box-pwr  { fill: #FAEEDA; stroke: #854F0B; stroke-width: 1.5; }
  .box-rum  { fill: #FAECE7; stroke: #993C1D; stroke-width: 1.5; }
  .arrow    { fill: none; stroke: #888; stroke-width: 1.2; marker-end: url(#arr); }
  .arrowboth{ fill: none; stroke: #888; stroke-width: 1.2; marker-end: url(#arr); marker-start: url(#arrstart); }
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M1 1L9 5L1 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrstart" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M1 1L9 5L1 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- MCU -->
<rect x="220" y="130" width="240" height="210" rx="8" class="box-mcu"/>
<text x="340" y="152" text-anchor="middle" class="th" fill="#3C3489">STM32 Nucleo-U545RE-Q</text>
<text x="340" y="168" text-anchor="middle" class="ts" fill="#534AB7">Embassy async executor</text>
<text x="232" y="200" class="ts" fill="#534AB7">ADC x2</text>
<text x="232" y="230" class="ts" fill="#534AB7">GPIO x4</text>
<text x="232" y="260" class="ts" fill="#534AB7">I2C</text>
<text x="232" y="290" class="ts" fill="#534AB7">USART</text>
<text x="232" y="320" class="ts" fill="#534AB7">PWM</text>
<text x="340" y="330" text-anchor="middle" class="ts" fill="#534AB7">3.3V rail</text>

<!-- Joystick -->
<rect x="18" y="130" width="160" height="50" rx="6" class="box-in"/>
<text x="98" y="150" text-anchor="middle" class="th" fill="#085041">Joystick</text>
<text x="98" y="167" text-anchor="middle" class="ts" fill="#0F6E56">KY-023 — ADC x2</text>

<!-- Buttons -->
<rect x="18" y="220" width="160" height="50" rx="6" class="box-in"/>
<text x="98" y="240" text-anchor="middle" class="th" fill="#085041">Buttons x4</text>
<text x="98" y="257" text-anchor="middle" class="ts" fill="#0F6E56">GPIO — pull-up</text>

<!-- HC-05 -->
<rect x="502" y="95" width="160" height="50" rx="6" class="box-out"/>
<text x="582" y="115" text-anchor="middle" class="th" fill="#0C447C">HC-05 Bluetooth</text>
<text x="582" y="132" text-anchor="middle" class="ts" fill="#185FA5">USART — SPP</text>

<!-- OLED -->
<rect x="502" y="175" width="160" height="50" rx="6" class="box-out"/>
<text x="582" y="195" text-anchor="middle" class="th" fill="#0C447C">OLED SSD1306</text>
<text x="582" y="212" text-anchor="middle" class="ts" fill="#185FA5">I2C — 128x64</text>

<!-- Vibration motor -->
<rect x="502" y="255" width="160" height="50" rx="6" class="box-rum"/>
<text x="582" y="275" text-anchor="middle" class="th" fill="#712B13">Vibration Motor</text>
<text x="582" y="292" text-anchor="middle" class="ts" fill="#993C1D">PWM module</text>

<!-- Power chain -->
<rect x="18" y="390" width="120" height="44" rx="6" class="box-pwr"/>
<text x="78" y="408" text-anchor="middle" class="th" fill="#633806">LiPo 3.7V</text>
<text x="78" y="424" text-anchor="middle" class="ts" fill="#854F0B">1000 mAh</text>

<rect x="170" y="390" width="120" height="44" rx="6" class="box-pwr"/>
<text x="230" y="408" text-anchor="middle" class="th" fill="#633806">TP4056</text>
<text x="230" y="424" text-anchor="middle" class="ts" fill="#854F0B">USB-C charger</text>

<rect x="322" y="390" width="120" height="44" rx="6" class="box-pwr"/>
<text x="382" y="408" text-anchor="middle" class="th" fill="#633806">AMS1117-3.3</text>
<text x="382" y="424" text-anchor="middle" class="ts" fill="#854F0B">LDO regulator</text>

<!-- Arrows: inputs → MCU -->
<line x1="178" y1="155" x2="220" y2="195" class="arrow"/>
<text x="188" y="178" class="lbl">ADC</text>

<line x1="178" y1="245" x2="220" y2="228" class="arrow"/>
<text x="184" y="240" class="lbl">GPIO</text>

<!-- Arrows: MCU → outputs -->
<line x1="460" y1="210" x2="502" y2="120" class="arrow"/>
<text x="462" y="165" class="lbl">USART</text>

<line x1="460" y1="240" x2="502" y2="200" class="arrow"/>
<text x="464" y="222" class="lbl">I2C</text>

<line x1="460" y1="295" x2="502" y2="280" class="arrow"/>
<text x="464" y="290" class="lbl">PWM</text>

<!-- Power chain arrows -->
<line x1="138" y1="412" x2="170" y2="412" class="arrow"/>
<line x1="290" y1="412" x2="322" y2="412" class="arrow"/>
<line x1="382" y1="390" x2="340" y2="345" class="arrow"/>
<text x="348" y="375" class="lbl">3.3V</text>

<!-- PC Host -->
<rect x="502" y="365" width="160" height="44" rx="6" fill="#F5F5F5" stroke="#999" stroke-width="1.5"/>
<text x="582" y="383" text-anchor="middle" class="th" fill="#444">Host PC</text>
<text x="582" y="399" text-anchor="middle" class="ts" fill="#666">vJoy + Python</text>

<!-- HC-05 <-> Host PC -->
<line x1="582" y1="145" x2="582" y2="365" class="arrowboth"/>
<text x="592" y="258" class="lbl">BT</text>
</svg>
