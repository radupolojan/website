<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333" />
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #0366d6; stroke-width: 2; rx: 8; ry: 8; }
      .box-mcu { fill: #f1f8ff; stroke: #0366d6; stroke-width: 3; rx: 8; ry: 8; }
      .box-power { fill: #fff5f5; stroke: #d73a49; stroke-width: 2; rx: 8; ry: 8; }
      .box-motor { fill: #f6f8fa; stroke: #24292e; stroke-width: 2; rx: 8; ry: 8; }
      .text-title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #24292e; text-anchor: middle; }
      .text-sub { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; fill: #586069; text-anchor: middle; }
      .line { fill: none; stroke: #333333; stroke-width: 2; marker-end: url(#arrow); }
      .line-power { fill: none; stroke: #d73a49; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrow); }
      .text-label { font-family: monospace; font-size: 11px; fill: #0366d6; background-color: white;}
      .text-label-power { font-family: monospace; font-size: 11px; fill: #d73a49; }
    </style>
  </defs>

  <rect x="30" y="160" width="120" height="80" class="box" />
  <text x="90" y="195" class="text-title">PC / Laptop</text>
  <text x="90" y="215" class="text-sub">Python Script</text>

  <rect x="230" y="120" width="160" height="160" class="box-mcu" />
  <text x="310" y="155" class="text-title">STM32 Nucleo</text>
  <text x="310" y="175" class="text-sub">U545RE-Q</text>
  <text x="310" y="205" class="text-sub">(Embassy Rust)</text>
  <text x="310" y="230" class="text-sub">Bresenham + Timers</text>

  <rect x="470" y="50" width="120" height="60" class="box" />
  <text x="530" y="75" class="text-title">A4988 Driver</text>
  <text x="530" y="95" class="text-sub">X-Axis</text>

  <rect x="470" y="150" width="120" height="60" class="box" />
  <text x="530" y="175" class="text-title">A4988 Driver</text>
  <text x="530" y="195" class="text-sub">Y-Axis</text>

  <rect x="470" y="250" width="120" height="60" class="box-motor" />
  <text x="530" y="275" class="text-title">SG90 Servo</text>
  <text x="530" y="295" class="text-sub">Toolhead (Z-Axis)</text>

  <rect x="670" y="50" width="120" height="60" class="box-motor" />
  <text x="730" y="75" class="text-title">NEMA 17 Motor</text>
  <text x="730" y="95" class="text-sub">X-Axis Movement</text>

  <rect x="670" y="150" width="120" height="60" class="box-motor" />
  <text x="730" y="175" class="text-title">NEMA 17 Motor</text>
  <text x="730" y="195" class="text-sub">Y-Axis Movement</text>

  <rect x="670" y="320" width="120" height="60" class="box-power" />
  <text x="730" y="345" class="text-title">Power Supply</text>
  <text x="730" y="365" class="text-sub">12V / 2A</text>

  <line x1="150" y1="200" x2="230" y2="200" class="line" />
  <text x="190" y="190" class="text-label" text-anchor="middle">USB / UART</text>

  <path d="M 390 140 L 430 140 L 430 80 L 470 80" class="line" />
  <text x="430" y="72" class="text-label" text-anchor="middle">STEP/DIR</text>

  <line x1="390" y1="180" x2="470" y2="180" class="line" />
  <text x="430" y="172" class="text-label" text-anchor="middle">STEP/DIR</text>

  <path d="M 390 260 L 430 260 L 430 280 L 470 280" class="line" />
  <text x="430" y="272" class="text-label" text-anchor="middle">PWM</text>

  <line x1="590" y1="80" x2="670" y2="80" class="line" />
  <text x="630" y="72" class="text-label" text-anchor="middle">Coils A/B</text>

  <line x1="590" y1="180" x2="670" y2="180" class="line" />
  <text x="630" y="172" class="text-label" text-anchor="middle">Coils A/B</text>

  <path d="M 670 350 L 630 350 L 630 110 L 590 110" class="line-power" />
  <path d="M 630 210 L 590 210" class="line-power" />
  <text x="650" y="215" class="text-label-power" text-anchor="middle">+12V</text>
  <text x="650" y="115" class="text-label-power" text-anchor="middle">+12V</text>

</svg>
